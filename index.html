<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Мой почерк</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f1;color:#1a1a1a;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:2rem 1.5rem 4rem}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.subtitle{font-size:14px;color:#777;margin-top:2px;margin-bottom:1.75rem}
.step{display:none}.step.active{display:block}
.step-bar{display:flex;gap:5px;margin-bottom:1.5rem;align-items:center}
.sd{height:6px;border-radius:3px;transition:all .25s ease}
.sd.done{background:#1a1a1a;width:10px}.sd.on{background:#1a1a1a;width:26px}.sd.todo{background:#d5d3ce;width:6px}
.card{background:white;border-radius:14px;border:1px solid #e8e6e0;padding:1.25rem 1.5rem;margin-bottom:14px}
.tip{background:#f0ede7;border-radius:10px;padding:11px 15px;font-size:13px;color:#555;line-height:1.75;margin-bottom:14px}
.tip b{color:#1a1a1a}.tip code{background:#e5e2db;border-radius:4px;padding:1px 5px;font-size:12px;font-family:monospace}
.bp{background:#1a1a1a;color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;transition:opacity .15s;white-space:nowrap}
.bp:hover{opacity:.8}.bp:disabled{opacity:.3;cursor:not-allowed}
.bs{background:transparent;color:#666;border:1px solid #d0cec8;border-radius:9px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s;white-space:nowrap}
.bs:hover{background:#eeece8}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
textarea,select,input[type=text],input[type=password]{border:1px solid #d8d5cf;border-radius:9px;font-family:inherit;background:white;color:#1a1a1a;outline:none;font-size:14px}
textarea{width:100%;padding:12px;resize:vertical;line-height:1.65}
select{padding:7px 11px}
input[type=text],input[type=password]{padding:9px 12px;width:100%}
.dz{border:1.5px dashed #c8c5be;border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.dz:hover,.dz.drag{border-color:#555;background:#f9f8f5}
.dz-icon{font-size:28px;margin-bottom:6px;opacity:.45}
.dz p{font-size:14px;color:#777}.dz .hint{font-size:12px;color:#aaa;margin-top:3px}
.corner-dot{position:absolute;width:22px;height:22px;border-radius:50%;background:#d83a2a;border:2.5px solid white;cursor:crosshair;transform:translate(-50%,-50%);z-index:30;touch-action:none;box-shadow:0 1px 6px rgba(0,0,0,.4)}
.chars-wrap{display:flex;flex-wrap:wrap;gap:3px;max-height:330px;overflow-y:auto;padding:8px;border:1px solid #e8e5df;border-radius:10px;background:#faf9f6}
.ct{display:inline-flex;flex-direction:column;align-items:center;gap:1px;padding:2px 3px;border:1px solid #e5e3dd;border-radius:5px}
.ct span{font-size:8px;color:#bbb;line-height:1}
.lbl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:7px}
.status{font-size:13px;color:#888;display:flex;align-items:center;gap:6px}
.status.ok{color:#3a8a30}.status.err{color:#c03020}
